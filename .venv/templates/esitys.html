<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diaesityksen nopeus</title>
    <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
    <ul>
        <li><a href="{{ url_for('index') }}">Kalastustiedot</a></li>
        <li><a href="{{ url_for('esitys') }}">Diaesitys</a></li>
    </ul>
    <div class="main-div">
        <h1 class="otsikko">Muuta diaesityksen nopeutta</h1>
        <form class="form" action="{{ url_for("esitys")}}" method="post">    
            <label class="label" for="nopeus">Diaesityksen nopeus(millisekuntteina):</label>
            <input type="number" id="nopeus" name="nopeus" placeholder="nopeus. esim 2000" class="input" required>
            <br/>
            <span>{{ error }}</span>
            <button type="submit" class="button">Lähetä</button>
        </form>
    </div>
</body>
</html>
