<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalastustiedot</title>
    <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
    <!-- navbar -->
    <ul>
        <li><a href="{{ url_for('index') }}">Kalastustiedot</a></li>
        <li><a href="{{ url_for('esitys') }}">Vaihda diaesityksen nopeutta</a></li>
    </ul>
    <div class="main-div">
        <h1 class="otsikko">Kalastustiedot</h1>
        <!-- form lomake -->
        <form class="form" action="{{ url_for("index")}}" method="post">
            <label class="label" for="nimi">Nimi:</label>
            <input type="text" id="nimi" name="nimi" placeholder="Henkilönnimi" class="input" maxlength="24" required>
            <br/>
            <label class="label">Valitse kalalaji:</label>
            <select id="KalaLaji" name="laji" required>
                <option value="">Valitse kalalaji</option>
                {%for i in lajit%}
                <option value="{{ i }}">
                    <span>{{ i }}</span>
                </option>
                {%endfor%}
                <option value="muu">
                    <span>muu</span>
                </option>

            </select>

            <br/>
            <label class="label" for="pituus">Pituus (cm):</label>
            <input type="number" oninput="if (this.value.length > this.maxLength) this.value = this.value.slice(0, 6);" maxlength="6" step="0" id="pituus" name="pituus" placeholder="Kalan pituus" class="input" required>
            <br/>        
            <label class="label" for="paino">Paino (kg):</label>
            <input type="number" oninput="if (this.value.length > this.maxLength) this.value = this.value.slice(0, 6);" maxlength="6" step="0.01" id="paino" name="paino" placeholder="Kalan paino" class="input" required>                 
            <br/>
            <label class="label" for="paikka">Paikka:</label>
            <input type="text" id="paikka" name="paikka" placeholder="Kalansaanti paikka" class="input" maxlength="24" required>
            <br/>
            <label class="label" for="aika">Aika:</label>
            <input type="date" id="aika" name="aika" class="input" required>
            <br/>
            <label class="label" for="viehe">Viehe:</label>
            <input type="text" id="viehe" name="viehe" placeholder="Viehe esim. uistin" class="input" maxlength="24" required>
            <br/>
            <label class="label" for="vapa">Vapa:</label>
            <input type="text" id="vapa" name="vapa" placeholder="Vapa esim. avokelavapa" class="input" maxlength="24" required>
            <button type="submit" class="button">Lähetä</button>
            <!-- teksti onnistuko syöttö vai ei -->
            <span id="text">{{ text }}</span>
        </form>

        <div class="laji_muu_div" id="laji_muu_div">
            <form class="laji_muu_form" id="laji_muu_form" action="{{ url_for("muu")}}" method="post">
                <h2>Mikä kalalaji</h2>
                <input  type="text" id="lajiMuu" name="lajiMuu" placeholder="Muu mikä" maxlength="24">
                <button type="submit" class="button">Lähetä</button>
            </form>    
        </div>
        
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
