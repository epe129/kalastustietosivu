<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalastustiedot</title>
    <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
    <ul>
        <li><a href="{{ url_for('index') }}">Kalastustiedot</a></li>
        <li><a href="{{ url_for('esitys') }}">Diaesitys</a></li>
    </ul>

    <div class="main-div">
        <h1 class="otsikko">Kalastustiedot</h1>
        <form class="form" action="{{ url_for("index")}}" method="post">
            
            <label class="label" for="nimi">Nimi:</label>
            <input type="text" id="nimi" name="nimi" placeholder="Henkilönnimi" class="input" required>
            
            <br/>

            <label class="label" for="pituus">Pituus (cm):</label>
            <input type="number" step="0.001" id="pituus" name="pituus" placeholder="Kalan pituus" class="input" required>
            
            <br/>        
            
            <label class="label" for="paino">Paino (kg):</label>
            <input type="number" step="0.001" id="paino" name="paino" placeholder="Kalan paino" class="input" required>

            <br/>

            <label class="label">Valitse kalalaji:</label>
            <select id="KalaLaji" name="laji">
                <option value="">Valitse kalalaji</option>
                <option value="ahven">
                    <span>ahven</span>
                </option>
                <option value="hauki">
                    <span>hauki</span>
                </option>
                <option value="kuha">
                    <span>kuha</span>
                </option>
                <option value="siika">
                    <span>siika</span>
                </option>
                <option value="taimen">
                    <span>taimen</span>
                </option>
                <option value="made">
                    <span>made</span>
                </option>
                <option value="lohi">
                    <span>lohi</span>
                </option>
                <option value="muu">
                    <span>muu</span>
                </option>
            </select>

            <input id="lajiMuu" name="lajiMuu" class="inputMuu" placeholder="Muu mikä">     

            <br/>
        
            <label class="label" for="paikka">Paikka:</label>
            <input type="text" id="paikka" name="paikka" placeholder="Kalansaanti paikka" class="input" required>

            <br/>
        
            <label class="label" for="viehe">Viehe:</label>
            <input type="text" id="viehe" name="viehe" placeholder="Viehe esim. uistin" class="input" required>

            <br/>
        
            <label class="label" for="vapa">Vapa:</label>
            <input type="text" id="vapa" name="vapa" placeholder="Vapa esim. avokelavapa" class="input" required>

            <br/>

            <label class="label" for="aika">Aika:</label>
            <input type="datetime-local" id="aika" name="aika" class="input" required>

            <button type="submit" class="button">Lähetä</button>
        
        </form>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
